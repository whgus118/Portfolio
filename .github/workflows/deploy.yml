name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # main과 master 브랜치 push 모두 대응

# GitHub Pages 배포 권한 허용 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 여러 빌드가 동시에 실행되어 꼬이지 않도록 동시성 제어
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install # package-lock.json 여부에 따라 유연하게 대응

      - name: Build Project
        run: npm run build

      - name: Setup GitHub Pages Config
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 빌드 기본 출력 폴더인 dist를 아티팩트로 지정

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
